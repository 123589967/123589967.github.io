  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Simsun", "宋体", sans-serif;
      background: url(img/0.jpg) center;

    .content {

    .love-list {

    }

    .love-list th,

      padding: 8px;
    }

    .img-F {
      text-align: center;
      margin: 30px 0;
    }

    .img-F img {
      width: 90%;
      max-width: 400px;
      height: auto;
      border: 2px solid #ffffff;
      margin: 10px;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .img-F img.loaded {

    }

    .img-F cite,
    .img-F p {
      margin: 10px 0;
      color: #111;
    }

      width: 209px;
      height: 170px;
      margin: 0 auto;
    }

    .end {
      width: 200px;
      height: 24px;
      margin: 0 auto;

    }
  </style>
</head>

  <div class="end" style="text-align: center;">
    <p style="color:#FF9999;">饶家恺 ❤️ 钱薛滢</p>
  </div>

  <script>
    const startDate = new Date("2023-09-16T00:00:00");

    if (isNaN(startDate.getTime())) {
      document.getElementById("loveDays").innerText = "日期格式错误";
    } else {
      function calculateLoveDuration() {
        const now = new Date();

        const timeDiff = now - startDate;
        const totalDays = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

        let years = now.getFullYear() - startDate.getFullYear();
        let months = now.getMonth() - startDate.getMonth();
        let days = now.getDate() - startDate.getDate();

        if (days < 0) {
          months--;
          const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
          days += lastMonth.getDate();
        }

        if (months < 0) {
          years--;
          months += 12;
        }

        const formatNum = (num) => num.toString().padStart(2, '0');

        const displayText = `${formatNum(years)} 年 ${formatNum(months)} 月 ${formatNum(days)} 天 总计 ${totalDays} 天`;

        document.getElementById("loveDays").innerText = displayText;
      }

      calculateLoveDuration();
      setInterval(calculateLoveDuration, 1000);
    }
  </script>
